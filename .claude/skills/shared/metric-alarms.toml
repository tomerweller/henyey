# ── COUNTER-STREAK (check 12b) ──────────────────────────────────────────────
# Folded from .claude/skills/shared/check-12b-constants.toml

[[alarm]]
name = "recovery-stalled"
metric = "henyey_recovery_stalled_tick_total"
kind = "counter-streak"
extraction = "form2"
labels = [{ key = "reason", value = "forcing_catchup_behind" }]
