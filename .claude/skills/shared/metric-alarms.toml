# Monitor-tick Alarm Catalog
#
# Single source of truth for all monitor-tick metric alarms.
# Evaluated by scripts/lib/eval-alarms.py — see that file for semantics.
#
# This catalog serves the monitor-tick LLM skill ONLY. It is independent of
# metrics/alerts/henyey-slo-alerts.yaml (Grafana SLO rules), which uses
# Prometheus rate()/increase() over time windows. Threshold differences
# between the two systems are intentional.
#
# See .claude/skills/shared/ALARM_SURFACES.md for the policy on alarm surface
# ownership, overlap, and reconciliation.
#
# semantic_change_date: Optional ISO 8601 UTC timestamp (YYYY-MM-DDTHH:MM:SSZ)
# per alarm. Records when the alarm's evaluation semantics last changed.
# Setting this enables automatic invalidation of baselines whose replay window
# (first_ts) predates the change, and invalidation of acknowledgments recorded
# before this date. Set to the deployment date of the change or later (never
# earlier — earlier risks missing contamination).
#
# Schema version — evaluator rejects unknown versions.
schema_version = 1

# ── COUNTERS ─────────────────────────────────────────────────────────────────

[[alarm]]
name = "lost-sync"
baseline_version = 3  # bumped in #2642: force re-invalidation of stable baselines created during post-#2612 transition
semantic_change_date = "2026-05-13T20:00:00Z"  # deployed via #2642 (c45e6c80, committed 19:52 UTC)
metric = "stellar_herder_lost_sync_total"
kind = "counter"
extraction = "form1"
labels = []
op = ">="
threshold = 1
severity = "SYNC"
gates = ["warmup-2-ticks"]
cooldown_key = "stellar_herder_lost_sync_total"
cooldown_seconds = 3600
filing_title = "metrics: stellar_herder_lost_sync_total — delta={value}"
filing_search = "metrics: stellar_herder_lost_sync_total"
summary = "Herder lost sync"
details = "delta={value}"
notes = "Semantic change in #2612: counter only increments on tracking timeout (parity with stellar-core mLostSync.Mark). Version bumped again in #2642 to force-invalidate stable baselines that captured transitional data during post-#2612 rollout."

