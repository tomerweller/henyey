# ── COUNTER-RATIO (ratio checks) ────────────────────────────────────────────

[[alarm]]
name = "scp-accept-rate-low"
kind = "counter-ratio"
numerator_sum = [
    "henyey_scp_post_verify_total{reason=\"accepted\"}",
    "henyey_scp_post_verify_total{reason=\"processed_directly\"}",
]
numerator_extraction = "form2"
denominator = "henyey_scp_post_verify_total"
denominator_extraction = "form2-sum-all"
denominator_includes_numerator = true
expected_labels = [
    "invalid_sig", "panic", "drift_range", "drift_close_time",
    "drift_cannot_receive", "self_message", "non_quorum", "buffered",
    "duplicate", "too_far", "buffer_full", "processed_directly",
    "per_slot_full", "accepted",
]
ratio_op = "<"
ratio_threshold = 0.05
min_volume = 500
streak_threshold = 3
severity = "WARN"
gates = ["synced-only", "validator-only"]
cooldown_key = "scp_accept_rate"
cooldown_seconds = 3600
filing_title = "metrics: SCP accept rate — {value} < {threshold} ({streak} ticks)"
filing_search = "metrics: SCP accept rate"
summary = "SCP post-verify acceptance rate too low"
