[package]
name = "soroban-env-macros"
description = "Soroban contract environment macros."
homepage = "https://github.com/stellar/rs-soroban-env"
repository = "https://github.com/stellar/rs-soroban-env"
authors = ["Stellar Development Foundation <info@stellar.org>"]
license = "Apache-2.0"
version = "25.0.0"
edition = "2021"
rust-version = "1.84.0"

[lib]
proc-macro = true

[dependencies]
stellar-xdr = { version = "=25.0.0", default-features = false, features = ["curr", "std"] }
syn = {version="2.0.39",features=["full"]}
quote = "1.0.33"
proc-macro2 = "1.0.69"
itertools = "0.10.5"
serde = { version = "1.0.192", features = ["derive"] }
serde_json = "1.0.108"

[features]
next = ["stellar-xdr/next"]

[package.metadata.docs.rs]
all-features = true
