[package]
name = "soroban-env-host"
description = "Soroban contract host environment."
homepage = "https://github.com/stellar/rs-soroban-env"
repository = "https://github.com/stellar/rs-soroban-env"
authors = ["Stellar Development Foundation <info@stellar.org>"]
license = "Apache-2.0"
version = "25.0.0"
readme = "../README.md"
edition = "2021"
rust-version = "1.84.0"
build = "build.rs"

exclude = ["observations/"]

[dependencies]
soroban-builtin-sdk-macros = { version = "=25.0.0", path = "../soroban-builtin-sdk-macros" }
soroban-env-common = { version = "=25.0.0", path = "../soroban-env-common", features = ["std", "wasmi", "shallow-val-hash"] }
wasmi = { package = "soroban-wasmi", version = "=0.31.1-soroban.20.0.1", git = "https://github.com/stellar/wasmi", rev = "0ed3f3dee30dc41ebe21972399e0a73a41944aa0" }
wasmparser = "=0.116.1"
stellar-strkey = "0.0.13"
static_assertions = "1.1.0"
sha2 = "0.10.8"
hex-literal = "0.4.1"
hmac = "0.12.1"
ed25519-dalek = {version = ">=2.0.0", features = ["rand_core"] }
rand = "0.8.5"
rand_chacha = "0.3.1"
num-traits = "0.2.17"
num-integer = "0.1.45"
num-derive = "0.4.1"
backtrace = { version = "0.3.75", optional = true }
k256 = {version = "0.13.3", default-features = false, features = ["ecdsa", "arithmetic"]}
p256 = {version = "0.13.2", default-features = false, features = ["ecdsa", "arithmetic"]}
ecdsa = {version = "0.16.7", default-features = false}
sec1 = {version = "0.7.2"}
elliptic-curve = { version = "0.13.5", default-features = false}
generic-array = { version = "0.14.7"}
getrandom = { version = "0.2.11", features=["js"] }
sha3 = "0.10.8"
curve25519-dalek = { version = ">=4.1.3", default-features = false, features = ["digest"]}
ark-bls12-381 = { version = "0.4.0"}
ark-bn254 = { version = "0.4.0"}
ark-serialize = { version = "0.4.2"}
ark-ff = { version = "0.4.2"}
ark-ec = { version = "0.4.2"}

[target.'cfg(not(target_family = "wasm"))'.dependencies]
tracy-client = { version = "0.17.0", features = ["enable", "timer-fallback"], default-features = false, optional = true }

[dev-dependencies]
soroban-env-macros = { version = "=25.0.0", path = "../soroban-env-macros" }

[dev-dependencies.stellar-xdr]
version = "=25.0.0"
default-features = false
features = ["arbitrary"]

[features]
testutils = ["soroban-env-common/testutils", "recording_mode"]
backtrace = ["dep:backtrace"]
next = ["soroban-env-common/next", "stellar-xdr/next"]
tracy = ["dep:tracy-client", "soroban-env-common/tracy"]
recording_mode = []
bench = ["testutils"]
unstable-next-api = []

[package.metadata.docs.rs]
features = ["recording_mode", "tracy", "testutils"]
