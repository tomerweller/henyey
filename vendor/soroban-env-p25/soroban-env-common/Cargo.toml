[package]
name = "soroban-env-common"
description = "Soroban contract environment common types and functionality."
homepage = "https://github.com/stellar/rs-soroban-env"
repository = "https://github.com/stellar/rs-soroban-env"
authors = ["Stellar Development Foundation <info@stellar.org>"]
license = "Apache-2.0"
version = "25.0.0"
readme = "../README.md"
edition = "2021"
rust-version = "1.84.0"

[build-dependencies]
crate-git-revision = "0.0.6"

[dependencies]
soroban-env-macros = { version = "=25.0.0", path = "../soroban-env-macros" }
stellar-xdr = { version = "=25.0.0", default-features = false, features = ["curr"] }
wasmi = { package = "soroban-wasmi", version = "=0.31.1-soroban.20.0.1", git = "https://github.com/stellar/wasmi", rev = "0ed3f3dee30dc41ebe21972399e0a73a41944aa0", optional = true }
wasmparser = { version = "=0.116.1", optional = true }
serde = { version = "1.0.192", features = ["derive"], optional = true }
static_assertions = "1.1.0"
ethnum = "1.5.0"
arbitrary = { version = "1.3.2", features = ["derive"], optional = true }
num-traits = {version = "0.2.17", default-features = false}
num-derive = "0.4.1"

[target.'cfg(not(target_family = "wasm"))'.dependencies]
tracy-client = { version = "0.17.0", features = ["enable", "timer-fallback"], default-features = false, optional = true }

[dev-dependencies]
num_enum = "0.7.1"
num-traits = "0.2.17"

[features]
std = ["stellar-xdr/std", "stellar-xdr/base64"]
serde = ["dep:serde", "stellar-xdr/serde"]
wasmi = ["dep:wasmi", "dep:wasmparser"]
testutils = ["dep:arbitrary", "stellar-xdr/arbitrary"]
next = ["stellar-xdr/next", "soroban-env-macros/next"]
tracy = ["dep:tracy-client"]
shallow-val-hash = []

[package.metadata.docs.rs]
all-features = true
