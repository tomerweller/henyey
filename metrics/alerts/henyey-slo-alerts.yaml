# Henyey SLO Alert Rules
#
# Grafana file-based alert provisioning for henyey validator metrics.
# Deploy by copying to your Grafana provisioning/alerting/ directory.
# See README.md in this directory for full deployment instructions.
#
# Datasource UID "000000001" matches the henyey dashboards.
# Change it if your Prometheus datasource uses a different UID.

apiVersion: 1

groups:
  - orgId: 1
    name: henyey-slo
    folder: Henyey
    interval: 1m
    rules:
      # ── Alert 1: Invariant Failure ────────────────────────────────
      # Fires on any new non-strict invariant failure in the last 10m.
      # Strict invariant failures panic before Prometheus can scrape;
      # those are covered by the companion process-down alert below.
      - uid: henyey-invariant-failure
        title: "Henyey: Invariant Failure"
        condition: threshold
        for: 0s
        labels:
          severity: critical
          team: henyey
        annotations:
          summary: "Invariant failure on {{ $labels.instance }}"
          description: >-
            Non-strict invariant failure detected:
            increase(stellar_ledger_invariant_failure_total) > 0
            in last 10m on {{ $labels.instance }}.
            Investigate immediately.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "increase(stellar_ledger_invariant_failure_total{job=\"henyey\"}[10m])"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 2: TX Internal Error Rate ───────────────────────────
      # Fires when transaction internal error rate exceeds 0.01/s for
      # 5 minutes, matching the dashboard red threshold.
      - uid: henyey-tx-internal-error
        title: "Henyey: TX Internal Error Rate"
        condition: threshold
        for: 5m
        labels:
          severity: critical
          team: henyey
        annotations:
          summary: "TX internal error rate > 0.01/s on {{ $labels.instance }}"
          description: >-
            rate(stellar_ledger_transaction_internal_error_total[5m]) > 0.01
            sustained for 5m on {{ $labels.instance }}.
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "rate(stellar_ledger_transaction_internal_error_total{job=\"henyey\"}[5m])"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.01
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 3a: Quorum Fail At — Warning ───────────────────────
      # Fires when quorum resilience drops to exactly 1 (yellow zone).
      # Uses PromQL comparison to filter to only == 1 values, making
      # this mutually exclusive with the critical rule (< 1).
      - uid: henyey-quorum-failat-warn
        title: "Henyey: Quorum Fail At (Warning)"
        condition: threshold
        for: 5m
        labels:
          severity: warning
          team: henyey
        annotations:
          summary: "Quorum fail-at == 1 on {{ $labels.instance }}"
          description: >-
            stellar_quorum_fail_at == 1 for 5m on {{ $labels.instance }}.
            One more node failure will cause quorum loss.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "stellar_quorum_fail_at{job=\"henyey\"} == 1"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 3b: Quorum Fail At — Critical ──────────────────────
      # Fires when quorum resilience drops to 0 (red zone).
      - uid: henyey-quorum-failat-crit
        title: "Henyey: Quorum Fail At (Critical)"
        condition: threshold
        for: 5m
        labels:
          severity: critical
          team: henyey
        annotations:
          summary: "Quorum fail-at < 1 on {{ $labels.instance }}"
          description: >-
            stellar_quorum_fail_at < 1 for 5m on {{ $labels.instance }}.
            Quorum may already be lost. Immediate attention required.
        noDataState: Alerting
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "stellar_quorum_fail_at{job=\"henyey\"}"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 4: Process Down ─────────────────────────────────────
      # Companion alert: fires when the henyey process stops being
      # scraped. Required for noDataState: OK rules to be sound, and
      # catches strict invariant panics that crash before scrape.
      - uid: henyey-process-down
        title: "Henyey: Process Down"
        condition: threshold
        for: 2m
        labels:
          severity: critical
          team: henyey
        annotations:
          summary: "Henyey process down on {{ $labels.instance }}"
          description: >-
            up{job="henyey"} == 0 for 2m on {{ $labels.instance }}.
            The henyey process is not responding to scrapes.
            This may indicate a crash (including strict invariant panics).
        noDataState: Alerting
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "up{job=\"henyey\"}"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ════════════════════════════════════════════════════════════════
      # Phase 2: Henyey-Specific Alerts (issue #2551)
      # ════════════════════════════════════════════════════════════════

      # ── Alert 5: Post-Catchup Hard Reset ─────────────────────────
      # Fires on any post-catchup hard reset in the last 10m.
      # A hard reset discards local state and restarts catchup —
      # any occurrence on a converged node is abnormal.
      # Policy-based alert (no dashboard panel).
      - uid: henyey-post-catchup-hard-reset
        title: "Henyey: Post-Catchup Hard Reset"
        condition: threshold
        for: 0s
        labels:
          severity: critical
          team: henyey
        annotations:
          summary: "Post-catchup hard reset on {{ $labels.instance }}"
          description: >-
            increase(henyey_post_catchup_hard_reset_total) > 0
            in last 10m on {{ $labels.instance }}.
            Local state was discarded and catchup restarted.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "increase(henyey_post_catchup_hard_reset_total{job=\"henyey\"}[10m])"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 6: Recovery Stalled (Forcing Catchup Behind) ────────
      # Fires when the recovery loop is stalled with reason
      # "forcing_catchup_behind" — the only operationally significant
      # stall reason per ops guidance (metric-alarms.toml).
      # Threshold >= 3 matches the streak threshold.
      # Policy-based alert (no dashboard panel).
      - uid: henyey-recovery-stalled
        title: "Henyey: Recovery Stalled"
        condition: threshold
        for: 0s
        labels:
          severity: warning
          team: henyey
        annotations:
          summary: "Recovery stalled (forcing_catchup_behind) on {{ $labels.instance }}"
          description: >-
            increase(henyey_recovery_stalled_tick_total{reason="forcing_catchup_behind"}) >= 3
            in last 10m on {{ $labels.instance }}.
            The recovery loop is stuck behind and unable to catch up.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "increase(henyey_recovery_stalled_tick_total{job=\"henyey\",reason=\"forcing_catchup_behind\"}[10m])"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gte
                    params:
                      - 3
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 7: Recovery TX Set Stuck ────────────────────────────
      # Fires when the tx set fetch has been stuck for > 60 seconds.
      # The gauge value itself encodes duration (0 = not stuck).
      # Policy-based alert (no dashboard panel).
      - uid: henyey-recovery-txset-stuck
        title: "Henyey: Recovery TX Set Stuck"
        condition: threshold
        for: 0s
        labels:
          severity: warning
          team: henyey
        annotations:
          summary: "TX set fetch stuck > 60s on {{ $labels.instance }}"
          description: >-
            henyey_recovery_tx_set_stuck_seconds > 60
            on {{ $labels.instance }}.
            All peers exhausted for pending tx_set hashes.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "henyey_recovery_tx_set_stuck_seconds{job=\"henyey\"}"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 60
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 8: Overlay Fetch Channel Depth ──────────────────────
      # Fires when the overlay fetch channel current depth exceeds 128
      # for 5 minutes, indicating sustained backpressure.
      # Uses the instantaneous depth gauge, NOT the monotonic max
      # (which is sticky and never decreases).
      # Policy-based alert (no dashboard panel). Threshold is tunable.
      - uid: henyey-overlay-fetch-depth
        title: "Henyey: Overlay Fetch Channel Depth"
        condition: threshold
        for: 5m
        labels:
          severity: warning
          team: henyey
        annotations:
          summary: "Overlay fetch channel depth > 128 on {{ $labels.instance }}"
          description: >-
            henyey_overlay_fetch_channel_depth > 128
            sustained for 5m on {{ $labels.instance }}.
            The overlay consumer may not be keeping up with fetch responses.
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "henyey_overlay_fetch_channel_depth{job=\"henyey\"}"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 128
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 9a: FD Exhaustion — Warning ─────────────────────────
      # Fires when FD usage ratio exceeds 0.6 (yellow zone).
      # Dashboard-derived: matches panel id=10 yellow threshold.
      # Absent on non-Linux or when RLIMIT_NOFILE is infinity —
      # PromQL division yields no result, noDataState: OK suppresses.
      - uid: henyey-fd-exhaustion-warn
        title: "Henyey: FD Exhaustion (Warning)"
        condition: threshold
        for: 5m
        labels:
          severity: warning
          team: henyey
        annotations:
          summary: "FD usage > 60% on {{ $labels.instance }}"
          description: >-
            henyey_process_open_fds / henyey_process_max_fds > 0.6
            for 5m on {{ $labels.instance }}.
            File descriptor exhaustion approaching.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "henyey_process_open_fds{job=\"henyey\"} / henyey_process_max_fds{job=\"henyey\"}"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.6
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 9b: FD Exhaustion — Critical ────────────────────────
      # Fires when FD usage ratio exceeds 0.8 (red zone).
      # Dashboard-derived: matches panel id=10 red threshold.
      - uid: henyey-fd-exhaustion-crit
        title: "Henyey: FD Exhaustion (Critical)"
        condition: threshold
        for: 5m
        labels:
          severity: critical
          team: henyey
        annotations:
          summary: "FD usage > 80% on {{ $labels.instance }}"
          description: >-
            henyey_process_open_fds / henyey_process_max_fds > 0.8
            for 5m on {{ $labels.instance }}.
            File descriptor exhaustion imminent.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "henyey_process_open_fds{job=\"henyey\"} / henyey_process_max_fds{job=\"henyey\"}"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0.8
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 10a: Ledger Age — Warning ───────────────────────────
      # Fires when ledger age exceeds 10s while herder is tracking.
      # Dashboard-derived: matches panel id=2 yellow threshold.
      # Only fires in herder Tracking state (== 2); high age during
      # Syncing/Booting is expected and not actionable.
      - uid: henyey-ledger-age-warn
        title: "Henyey: Ledger Age (Warning)"
        condition: threshold
        for: 5m
        labels:
          severity: warning
          team: henyey
        annotations:
          summary: "Ledger age > 10s on {{ $labels.instance }}"
          description: >-
            stellar_ledger_age_current_seconds > 10 (while tracking)
            for 5m on {{ $labels.instance }}.
            The node is falling behind in ledger closes.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "stellar_ledger_age_current_seconds{job=\"henyey\"} and stellar_herder_state{job=\"henyey\"} == 2"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 10
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 10b: Ledger Age — Critical ──────────────────────────
      # Fires when ledger age exceeds 30s while herder is tracking.
      # Dashboard-derived: matches panel id=2 red threshold.
      - uid: henyey-ledger-age-crit
        title: "Henyey: Ledger Age (Critical)"
        condition: threshold
        for: 5m
        labels:
          severity: critical
          team: henyey
        annotations:
          summary: "Ledger age > 30s on {{ $labels.instance }}"
          description: >-
            stellar_ledger_age_current_seconds > 30 (while tracking)
            for 5m on {{ $labels.instance }}.
            The node is significantly behind. Investigate immediately.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "stellar_ledger_age_current_seconds{job=\"henyey\"} and stellar_herder_state{job=\"henyey\"} == 2"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 30
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 11: Quorum Missing Peers ────────────────────────────
      # Fires when any quorum set nodes are not responding.
      # Dashboard-derived: matches panel id=7 red threshold (>= 1).
      # Warning severity — the quorum-fail-at alerts (3a/3b) cover
      # the downstream impact at critical severity, providing layered
      # escalation.
      - uid: henyey-quorum-missing
        title: "Henyey: Quorum Missing Peers"
        condition: threshold
        for: 5m
        labels:
          severity: warning
          team: henyey
        annotations:
          summary: "Quorum missing peers >= 1 on {{ $labels.instance }}"
          description: >-
            stellar_quorum_missing >= 1 for 5m on {{ $labels.instance }}.
            One or more quorum set nodes are not responding.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "stellar_quorum_missing{job=\"henyey\"}"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gte
                    params:
                      - 1
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 12a: Peer Count — Warning ───────────────────────────
      # Fires when connected peer count drops below 8 (yellow zone).
      # Dashboard-derived: matches panel id=5 yellow threshold.
      # noDataState: OK — peer_count is a pre-registered gauge always
      # emitted when the process is running; absence means process
      # down, which is already covered by the Process Down alert.
      - uid: henyey-peer-count-warn
        title: "Henyey: Peer Count (Warning)"
        condition: threshold
        for: 5m
        labels:
          severity: warning
          team: henyey
        annotations:
          summary: "Peer count < 8 on {{ $labels.instance }}"
          description: >-
            stellar_peer_count < 8 for 5m on {{ $labels.instance }}.
            Connected peer count is low.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "stellar_peer_count{job=\"henyey\"}"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 8
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 12b: Peer Count — Critical ──────────────────────────
      # Fires when connected peer count drops below 3 (red zone).
      # Dashboard-derived: matches panel id=5 red threshold.
      - uid: henyey-peer-count-crit
        title: "Henyey: Peer Count (Critical)"
        condition: threshold
        for: 5m
        labels:
          severity: critical
          team: henyey
        annotations:
          summary: "Peer count < 3 on {{ $labels.instance }}"
          description: >-
            stellar_peer_count < 3 for 5m on {{ $labels.instance }}.
            Critically low peer connectivity. Network isolation possible.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "stellar_peer_count{job=\"henyey\"}"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 3
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ════════════════════════════════════════════════════════════════
      # Phase 3: Remaining Dashboard-Threshold Alerts (issue #2552)
      # ════════════════════════════════════════════════════════════════
      # Assessed 4 panels; 2 alert rules added, 2 classified as
      # diagnostic-only (Bucket Cache Hit Ratio, Snapshot Cache Hit
      # Ratio). See README.md for full assessment rationale.

      # ── Alert 13: Validator Not Tracking ──────────────────────────
      # Fires when herder state is not Tracking (≠ 2) for 20 minutes.
      # Uses != bool 2 to always produce a series (returns 0 when
      # healthy, 1 when not tracking).
      # for: 20m covers normal boot (15m) and fresh-start (20m)
      # scenarios. Crash recovery (~60m) may cause a brief transient
      # warning that auto-resolves.
      - uid: henyey-validator-not-tracking
        title: "Henyey: Validator Not Tracking"
        condition: threshold
        for: 20m
        labels:
          severity: warning
          team: henyey
        annotations:
          summary: "Validator not tracking on {{ $labels.instance }}"
          description: >-
            stellar_herder_state != 2 for 20m on {{ $labels.instance }}.
            The validator is not in Tracking state. Investigate herder
            state and connectivity.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "stellar_herder_state{job=\"henyey\"} != bool 2"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 14: Fragmentation ──────────────────────────────────
      # Fires when jemalloc fragmentation exceeds 50% for 15 minutes.
      # Threshold from ops guidance (monitor-tick SKILL.md:627);
      # steady-state is ~18%, post-restart ramps to ~35-45%.
      # Dashboard visual thresholds (yellow=15%, red=30%) are
      # diagnostic color bands, not alert thresholds — normal
      # operation sits between them.
      - uid: henyey-fragmentation
        title: "Henyey: Fragmentation"
        condition: threshold
        for: 15m
        labels:
          severity: warning
          team: henyey
        annotations:
          summary: "Fragmentation > 50% on {{ $labels.instance }}"
          description: >-
            henyey_jemalloc_fragmentation_pct > 50 for 15m
            on {{ $labels.instance }}.
            Jemalloc fragmentation is abnormally high.
            Investigate memory usage patterns.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 1500
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "henyey_jemalloc_fragmentation_pct{job=\"henyey\"}"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 1500
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 50
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold

      # ── Alert 15: Quorum Intersection Lost ───────────────────────
      # Fires when the network no longer enjoys transitive quorum
      # intersection. The metric is absent until the first publishable
      # check completes, so noDataState=OK avoids false alarms on
      # startup.
      - uid: henyey-quorum-intersection-lost
        title: "Henyey: Quorum Intersection Lost"
        condition: threshold
        for: 5m
        labels:
          severity: critical
          team: henyey
        annotations:
          summary: "Quorum intersection lost on {{ $labels.instance }}"
          description: >-
            stellar_quorum_transitive_intersection < 1 for 5m
            on {{ $labels.instance }}.
            Network no longer enjoys transitive quorum intersection.
            Investigate quorum configuration immediately.
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "000000001"
            model:
              expr: "stellar_quorum_transitive_intersection{job=\"henyey\"}"
              instant: true
              refId: A
          - refId: threshold
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: threshold
