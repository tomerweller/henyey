name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'prompts/**'
      - 'reports/**'
      - 'ai-summary/**'
      - '.claude/**'
      - '.github/skills/**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
      - run: cargo test --workspace --all-targets
      # Run herder tests gated behind test-support (SCP stage attribution, split equivalence)
      - run: cargo test -p henyey-herder --features test-support --tests

  doctest:
    name: Doctest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
      - name: Pre-test diagnostics
        run: |
          echo "::group::Runner health"
          df -h / /tmp
          df -ih / /tmp
          du -sh target/ ~/.cargo/ 2>/dev/null || true
          free -m
          cat /proc/meminfo | head -5
          ulimit -a
          echo "::endgroup::"
      - name: Run doctests
        run: cargo test --workspace --doc -j 1
      - name: Post-test diagnostics
        if: always()
        run: |
          echo "::group::Runner health"
          df -h / /tmp
          df -ih / /tmp
          du -sh target/ ~/.cargo/ 2>/dev/null || true
          free -m
          echo "::endgroup::"

  build-release:
    name: Build (release-ci)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: release-ci
      - run: cargo build --profile release-ci --all
