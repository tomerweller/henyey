# Supercluster (SSC) generated configuration fixture.
#
# This represents the config that SSC's Kubernetes mission controller generates
# for a stellar-core (or henyey) node in a test cluster. SSC injects these
# flat TOML keys before starting the binary.
#
# Fixture covers: watcher node in a 3-validator testnet cluster with load
# generation enabled, metadata streaming to stellar-rpc, and diagnostic events.

NETWORK_PASSPHRASE = "Test SDF Network ; September 2015"
HTTP_PORT = 11626
PEER_PORT = 11625
DATABASE = "sqlite3:///opt/stellar/stellar-core.db"
BUCKET_DIR_PATH = "/opt/stellar/buckets"
NODE_SEED = "SBXTJSLKQ2VZUEQNYU5EC6ZGQOONCX3JCFBK57R56YLYMUW76B2FMCJH self"
NODE_IS_VALIDATOR = false
NODE_HOME_DOMAIN = "testnet.stellar.org"

# Metadata streaming (stellar-rpc reads from fd:3)
METADATA_OUTPUT_STREAM = "fd:3"
EMIT_SOROBAN_TRANSACTION_META_EXT_V1 = true
EMIT_LEDGER_CLOSE_META_EXT_V1 = true
EMIT_CLASSIC_EVENTS = true

# Diagnostics
ENABLE_SOROBAN_DIAGNOSTIC_EVENTS = true
ENABLE_DIAGNOSTICS_FOR_TX_SUBMISSION = true

# Catchup configuration
CATCHUP_COMPLETE = false
CATCHUP_RECENT = 1024

# Testing flags (SSC enables load generation for integration tests)
UNSAFE_QUORUM = true
FORCE_SCP = true
ARTIFICIALLY_GENERATE_LOAD_FOR_TESTING = true
ARTIFICIALLY_ACCELERATE_TIME_FOR_TESTING = false

# Maintenance
AUTOMATIC_MAINTENANCE_PERIOD = 3600
AUTOMATIC_MAINTENANCE_COUNT = 50000

# Keys that SSC may generate but henyey silently ignores
RUN_STANDALONE = false
EXPERIMENTAL_BUCKETLIST_DB = true
PUBLIC_HTTP_PORT = true
DISABLE_XDR_FSYNC = true
COMMANDS = ["ll?level=info"]
PREFERRED_PEER_KEYS = ["GDKXE2OZMJIPOSLNA6N6F2BVCI3O777I2OOC4BV7VOYUEHYX7RTRYA7Y"]

# Peers
KNOWN_PEERS = ["core-testnet1.stellar.org:11625", "core-testnet2.stellar.org:11625", "core-testnet3.stellar.org:11625"]
PREFERRED_PEERS = ["core-testnet1.stellar.org:11625"]

# Home domains
[[HOME_DOMAINS]]
HOME_DOMAIN = "testnet.stellar.org"
QUALITY = "HIGH"

# Validators
[[VALIDATORS]]
NAME = "sdf_testnet_1"
HOME_DOMAIN = "testnet.stellar.org"
PUBLIC_KEY = "GDKXE2OZMJIPOSLNA6N6F2BVCI3O777I2OOC4BV7VOYUEHYX7RTRYA7Y"
ADDRESS = "core-testnet1.stellar.org"
HISTORY = "curl -sf http://history.stellar.org/prd/core-testnet/core_testnet_001/{0} -o {1}"

[[VALIDATORS]]
NAME = "sdf_testnet_2"
HOME_DOMAIN = "testnet.stellar.org"
PUBLIC_KEY = "GCUCJTIYXSOXKBSNFGNFWW5MUQ54HKRPGJUTQFJ5RQXZXNOLNXYDHRAP"
ADDRESS = "core-testnet2.stellar.org"
HISTORY = "curl -sf http://history.stellar.org/prd/core-testnet/core_testnet_002/{0} -o {1}"

[[VALIDATORS]]
NAME = "sdf_testnet_3"
HOME_DOMAIN = "testnet.stellar.org"
PUBLIC_KEY = "GC2V2EFSXN6SQTWVYA5EPJPBWWIMSD2XQNKUOHGEKB535AQE2I6IXV2Z"
ADDRESS = "core-testnet3.stellar.org"
HISTORY = "curl -sf http://history.stellar.org/prd/core-testnet/core_testnet_003/{0} -o {1}"

# History archives (top-level section format)
[HISTORY.sdf1]
get = "curl -sf https://history.stellar.org/prd/core-testnet/core_testnet_001/{0} -o {1}"

[HISTORY.sdf2]
get = "curl -sf https://history.stellar.org/prd/core-testnet/core_testnet_002/{0} -o {1}"
